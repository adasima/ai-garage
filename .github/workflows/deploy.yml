name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build public directory structure
        run: |
          mkdir -p public
          # dynamic-universe フォルダを public 配下にコピー
          cp -R dynamic-universe public/
          
          # ルートのリダイレクト HTML を作成
          cat << 'EOF' > public/index.html
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>ai-garage</title>
            <meta http-equiv="refresh" content="0; url=./dynamic-universe/">
            <script type="text/javascript">
              window.location.href = "./dynamic-universe/"
            </script>
          </head>
          <body>
            Redirecting to <a href="./dynamic-universe/">dynamic-universe</a>...
          </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
